version: '3.8'

services:
  newtg:
    build: .
    image: aiastia/mytgbot:code
    container_name: newtg
    volumes:
      - ./data:/app/data/
      - ./share_folder:/app/share_folder:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - BOT_TOKEN=${BOT_TOKEN}
    logging:
      options:
        max-size: "10m"
        max-file: "3"
